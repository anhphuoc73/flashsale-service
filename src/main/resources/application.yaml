spring:
  application:
    name: flashsale-service

  data:
    mongodb:
      uri: mongodb://mongodb:27017/flashsale
      auto-index-creation: true

    redis:
      host: redis
      port: 6379

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

server:
  port: 8080